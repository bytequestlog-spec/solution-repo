body{
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: flex;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container{
  background:white;
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  text-align: center;
  width : 350px;
}

 .ac{
  font-size: 24px;
  font-weight: 600;
  margin-bottom: 10px;
  color: #333;
}

.enter{
  margin-bottom: 20px;
  color: #677;
  font-size: 14px;
}

.date-input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #ddd;
  font-size: 14px;
  transition: 0.3s ease;
}

.date-input:focus {
  outline: none;
  border-color: #a5b4fc;
  box-shadow: 0 0 0 3px rgba(165, 180, 252, 0.3);
}

.cb {
  width: 100%;
  margin-top: 15px;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: #2571c7;
  color: white;
  font-weight: 500;
  cursor: pointer;
  transition: 0.3s ease;
}

.cb:hover {
  background: rgb(81, 78, 128);
  transform: translateY(-2px);
}

.div-js {
  margin-top: 20px;
  font-size: 14px;
  color: #444;
}


</style>

 <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

  <body>
<div class="container">

  <div class="ac">Age Calculator</div>

<div class="enter">Enter your birth date:</div>

<div><input type="text" class="date-input"></div>

<button class="cb">Calculate</button>

<div class="div-js"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>

  flatpickr(".date-input", {
  dateFormat: "Y-m-d"
});


  const button = document.querySelector('.cb');
  const ageElement = document.querySelector('.date-input');

const birthDate = {
      birthYear: '0000',
      birthMonth: '00',
      birthDay:'00'
};

  function displayAge(){

    if (ageElement.value){
    console.log(ageElement.value);

    birthDate.birthYear = ageElement.value.substring(0,4);
    birthDate.birthMonth = ageElement.value.substring(5,7);
    birthDate.birthDay = ageElement.value.substring(8,10);

    console.log(birthDate);

    const currentDate = new Date();
    let year = currentDate.getFullYear() - birthDate.birthYear;
    let month = currentDate.getMonth() + 1 - birthDate.birthMonth;
    let day = currentDate.getDate() - birthDate.birthDay;

    console.log(currentDate);
    console.log(year, month, day);

    /*if (currentDate.getMonth() + 1 < birthDate.birthMonth){
      if (currentDate.getDate() < birthDate.birthDay ){
        year--;
        month += 12;
        day += 30;
      }
    }*/
    if (day < 0){
      day += 30;
      month--;
    }

    if (month < 0 ){
      month += 12;
      year--;
    }
    

    if(year === 0 && month === 0 && day === 0){
      alert('HAPPY BIRTHDAY!!');
    }

    document.querySelector('.div-js').textContent = `you are ${year} years and ${month} months and ${day} days old`;


    
      }
      else {
        alert('no date was selected');
      }    


  }

  

  

    

  button.addEventListener('click', displayAge);

  
  


  
  
  
</script>
